<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新锐XR2026 期刊数据库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; }
  header { background: linear-gradient(135deg, #1a3a5c 0%, #2563eb 100%); color: #fff; padding: 28px 32px 20px; }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .5px; }
  header p { font-size: .85rem; opacity: .8; margin-top: 4px; }
  .toolbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 14px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap input { width: 100%; padding: 9px 14px 9px 38px; border: 1.5px solid #d0d7de; border-radius: 8px; font-size: .95rem; outline: none; transition: border .2s; }
  .search-wrap input:focus { border-color: #2563eb; }
  .search-wrap .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #888; font-size: 1rem; }
  select { padding: 9px 12px; border: 1.5px solid #d0d7de; border-radius: 8px; font-size: .88rem; background: #fff; cursor: pointer; outline: none; }
  select:focus { border-color: #2563eb; }
  .stats { margin-left: auto; font-size: .82rem; color: #666; white-space: nowrap; }
  .stats b { color: #2563eb; }
  .table-wrap { overflow-x: auto; padding: 0 32px 32px; margin-top: 16px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.08); font-size: .85rem; }
  thead tr { background: #1a3a5c; color: #fff; }
  thead th { padding: 11px 12px; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { background: #2563eb; }
  thead th .sort-arrow { opacity: .5; margin-left: 4px; }
  thead th.sorted .sort-arrow { opacity: 1; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .15s; }
  tbody tr:hover { background: #f5f8ff; }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .78rem; font-weight: 600; }
  .tier-1 { background: #fef3c7; color: #92400e; }
  .tier-2 { background: #dbeafe; color: #1e40af; }
  .tier-3 { background: #dcfce7; color: #166534; }
  .tier-4 { background: #f3f4f6; color: #374151; }
  .top-yes { background: #fce7f3; color: #9d174d; }
  .pagination { display: flex; gap: 6px; justify-content: center; align-items: center; padding: 16px 0 8px; flex-wrap: wrap; }
  .pagination button { padding: 5px 11px; border: 1.5px solid #d0d7de; border-radius: 6px; background: #fff; cursor: pointer; font-size: .85rem; }
  .pagination button:hover { border-color: #2563eb; color: #2563eb; }
  .pagination button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .page-info { font-size: .82rem; color: #666; margin-left: 8px; }
  @media(max-width:600px) { .toolbar { padding: 10px 12px; } .table-wrap { padding: 0 8px 24px; } }
</style>
</head>
<body>
<header>
  <h1>新锐XR2026 期刊分区数据库</h1>
  <p>新锐科学XR2026分区 · 共 15,220 本期刊（已移除ESCI）</p>
</header>
<div class="toolbar">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="搜索期刊名、ISSN、学科分类…">
  </div>
  <select id="filter-tier">
    <option value="">全部分区</option>
    <option value="1">1区</option>
    <option value="2">2区</option>
    <option value="3">3区</option>
    <option value="4">4区</option>
  </select>
  <select id="filter-category">
    <option value="">全部学科</option>
  </select>
  <select id="filter-top">
    <option value="">Top期刊</option>
    <option value="Yes">仅Top</option>
    <option value="No">非Top</option>
  </select>
  <div class="stats">显示 <b id="count">0</b> / <b>15220</b> 条</div>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="Journal Name">期刊名称 <span class="sort-arrow">↕</span></th>
        <th data-col="Category">学科分类 <span class="sort-arrow">↕</span></th>
        <th data-col="ISSN">ISSN</th>
        <th data-col="EISSN">EISSN</th>
        <th data-col="Tier (Zone)">分区 <span class="sort-arrow">↕</span></th>
        <th data-col="Is Top">Top <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="pagination" id="pagination"></div>
<script>
const PAGE_SIZE = 50;
let allData = [], filtered = [], page = 1, sortCol = 'Tier (Zone)', sortDir = 1;

async function loadCSV() {
  const res = await fetch('xr2026.csv');
  const text = await res.text();
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, '').replace(/^"|"$/g, ''));
  allData = lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += line[i];
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').trim());
    return obj;
  });
  // Populate category filter
  const cats = [...new Set(allData.map(r => r['Category']))].filter(Boolean).sort();
  const sel = document.getElementById('filter-category');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  applyFilters();
}

function tierNum(t) { const m = t.match(/(\d+)/); return m ? parseInt(m[1]) : 9; }

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const tier = document.getElementById('filter-tier').value;
  const cat = document.getElementById('filter-category').value;
  const top = document.getElementById('filter-top').value;
  filtered = allData.filter(r => {
    if (q && !r['Journal Name'].toLowerCase().includes(q) && !r['ISSN'].toLowerCase().includes(q) && !r['EISSN'].toLowerCase().includes(q) && !r['Category'].toLowerCase().includes(q)) return false;
    if (tier && tierNum(r['Tier (Zone)']) !== parseInt(tier)) return false;
    if (cat && r['Category'] !== cat) return false;
    if (top && r['Is Top'] !== top) return false;
    return true;
  });
  filtered.sort((a, b) => {
    let av = a[sortCol] || '', bv = b[sortCol] || '';
    if (sortCol === 'Tier (Zone)') { av = tierNum(av); bv = tierNum(bv); return (av - bv) * sortDir; }
    return av.localeCompare(bv) * sortDir;
  });
  page = 1;
  document.getElementById('count').textContent = filtered.length.toLocaleString();
  renderTable();
  renderPagination();
}

function tierClass(t) {
  const n = tierNum(t);
  return ['','tier-1','tier-2','tier-3','tier-4'][n] || 'tier-4';
}

function renderTable() {
  const start = (page - 1) * PAGE_SIZE;
  const rows = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => {
    const tier = r['Tier (Zone)'];
    const isTop = r['Is Top'] === 'Yes';
    return `<tr>
      <td><b>${r['Journal Name']}</b></td>
      <td>${r['Category']}</td>
      <td>${r['ISSN']}</td>
      <td>${r['EISSN']}</td>
      <td><span class="badge ${tierClass(tier)}">${tier}</span></td>
      <td>${isTop ? '<span class="badge top-yes">Top</span>' : ''}</td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹ 上一页</button>`;
  let pages = [];
  for (let p = 1; p <= total; p++) {
    if (p === 1 || p === total || (p >= page-2 && p <= page+2)) pages.push(p);
    else if (pages[pages.length-1] !== '...') pages.push('...');
  }
  pages.forEach(p => {
    if (p === '...') html += `<span style="padding:0 4px">…</span>`;
    else html += `<button class="${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button onclick="goPage(${page+1})" ${page===total?'disabled':''}>下一页 ›</button>`;
  html += `<span class="page-info">第 ${page}/${total} 页，共 ${filtered.length.toLocaleString()} 条</span>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  page = p;
  renderTable();
  renderPagination();
  window.scrollTo(0, 0);
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = sortDir === 1 ? '↑' : '↓';
    applyFilters();
  });
});

['search','filter-tier','filter-category','filter-top'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener(id === 'search' ? 'input' : 'change', applyFilters);
});

loadCSV();
</script>
</body>
</html>
